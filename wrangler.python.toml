# Python challenger Worker — deploy separately from TypeScript stable arm.
#   npm run deploy:python
# Live: https://agentsam-cms-python.meauxbility.workers.dev

name = "agentsam-cms-python"
main = "src/entry.py"
compatibility_date = "2026-05-23"
compatibility_flags = ["python_workers", "disable_python_external_sdk"]
account_id = "ede6590ac0d2fb7daf155b35653457b2"
workers_dev = true

[vars]
CLOUDFLARE_ACCOUNT_ID = "ede6590ac0d2fb7daf155b35653457b2"
CMS_R2_DEV_PREFIX = "cms-python/"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = [
  "/dashboard",
  "/health",
  "/analytics",
  "/api/analytics",
  "/api/v1",
  "/api/health",
  "/api/evals",
]

[[d1_databases]]
binding = "DB"
database_name = "inneranimalmedia-business"
database_id = "cf87b717-d4e2-4cf8-bab0-a81268e32d49"

[[r2_buckets]]
binding = "DASHBOARD"
bucket_name = "cms"

[observability]
enabled = true
