# AgentSam CMS Editor
# Live: https://agentsam-cms-editor.meauxbility.workers.dev
# Design Studio: https://agentsam-cms-editor.meauxbility.workers.dev/design-studio

name = "agentsam-cms-editor"
main = "src/index.ts"
compatibility_date = "2026-05-14"
account_id = "ede6590ac0d2fb7daf155b35653457b2"
workers_dev = true

[vars]
CLOUDFLARE_ACCOUNT_ID = "ede6590ac0d2fb7daf155b35653457b2"
CMS_R2_DEV_PREFIX = "cms-editor/"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = [
  "/design-studio",
  "/dashboard",
  "/health",
  "/analytics",
  "/api/analytics",
  "/api/v1",
  "/api/health",
  "/api/evals",
  "/api/cms",
  "/api/agent",
]

[[d1_databases]]
binding = "DB"
database_name = "inneranimalmedia-business"
database_id = "cf87b717-d4e2-4cf8-bab0-a81268e32d49"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "cms"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "dc87920b0a9247979a213c09df9a0234"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "08183bb9d2914e87ac8395d7e4ecff60"

[browser]
binding = "MYBROWSER"

[observability]
enabled = true
